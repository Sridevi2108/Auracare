version: "3.1"

rules:
- rule: Greet user when they say hi
  steps:
    - intent: greet
    - action: utter_greet

- rule: Respond to goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Offer crisis support
  steps:
    - intent: crisis_support
    - action: utter_crisis_support

- rule: Handle stress
  steps:
  - intent: express_stress
  - action: utter_stress_advice