version: "3.1"

nlu:
- intent: greet
  examples: |
    - Hi
    - Hello
    - Hey there
    - Good morning
    - Good evening

- intent: goodbye
  examples: |
    - Bye
    - See you later
    - Goodbye
    - Take care

- intent: encouragement
  examples: |
    - I feel like giving up
    - I need motivation
    - Things are really hard right now

- intent: coping_strategies
  examples: |
    - How can I manage stress?
    - I feel overwhelmed
    - What can I do to calm myself down?

- intent: self_care_tips
  examples: |
    - How can I practice self-care?
    - Give me some self-care tips

- intent: anxiety_relief
  examples: |
    - I'm feeling anxious
    - How do I deal with anxiety?

- intent: negative_thoughts
  examples: |
    - I'm having negative thoughts
    - I feel like I'm not good enough

- intent: crisis_support
  examples: |
    - I feel really hopeless
    - I'm in a crisis
    - I don't know what to do anymore

- intent: sleep_tips
  examples: |
    - I can't sleep
    - How can I sleep better?

- intent: journaling_prompt
  examples: |
    - I want to start journaling
    - Give me a journaling prompt

- intent: mindfulness_exercise
  examples: |
    - Guide me through a mindfulness exercise
    - How can I be more mindful?

- intent: express_sadness
  examples: |
    - I'm feeling down
    - I am sad
    - I'm not feeling great
    - I feel lonely
    - I'm depressed

- intent: express_stress
  examples: |
    - I'm so stressed
    - I feel overwhelmed
    - I'm under a lot of pressure

- intent: affirm
  examples: |
    - Yes
    - Sure
    - Absolutely
    - That sounds good

- intent: provide_details
  examples: |
    - My username is [john_doe](username)
    - My email is [john@example.com](email)
    - My password is [password123](password)